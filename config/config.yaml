# CONFIG FILE — edit these values for your dataset

data:
  raw_data_path: "data/Microsoft_Stock.csv"
  date_column: "Date"                   # name of the datetime column in your CSV
  target_column: "Close"                # name of the column you want to forecast
  date_format: null                     # # e.g. "%Y-%m-%d" if auto-parse fails, else null

split:
  test_size: 0.2          # last 20% of the time series is used as test set (chronological, not random)

transformation:
  apply_log_transform: false   # set true if series has strong multiplicative trend / exponential growth
  seasonal_period: 7            # e.g. 7 for weekly seasonality on daily data, 12 for monthly on yearly data

model:
  # ARIMA / SARIMAX search grid — kept small.
  p_values: [0, 1, 2]
  d_values: [0, 1]
  q_values: [0, 1, 2]
  seasonal: false          # set true to use SARIMAX instead of ARIMA
  forecast_horizon: 30     # how many steps ahead predict_pipeline.py forecasts by default

artifacts:
  model_path: "artifacts/model.pkl"
  transform_info_path: "artifacts/transform_info.pkl"
  train_data_path: "artifacts/train.csv"
  test_data_path: "artifacts/test.csv"